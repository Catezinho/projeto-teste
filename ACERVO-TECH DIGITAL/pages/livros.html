<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcervoTech</title>
    <link rel="stylesheet" href="../css/estilo.css">
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo">📚 AcervoTech</div>
            <div class="menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="livros.html" class="ativo">Livros</a>
                <a href="usuarios.html">Usuários</a>
                <a href="emprestimos.html">Empréstimos</a>
                <a href="devolucoes.html">Devoluções</a>
                <a href="consultar.html">Consultar</a>
                <a href="relatorios.html">Relatórios</a>
            </div>
            <div class="usuario">
                <span id="nomeUsuario"></span>
                <button onclick="logout()">Sair</button>
            </div>
        </nav>

        <h2>Gerenciar Livros</h2>
        <button onclick="abrirFormLivro()" class="btn-primary" style="width:auto; margin-bottom:16px;">+ Novo Livro</button>

        <div class="tabela-wrapper">
            <table>
                <thead><tr><th>ID</th><th>Título</th><th>Autor</th><th>ISBN</th><th>Categoria</th><th>Exemplares</th><th>Disponíveis</th><th>Ações</th></tr></thead>
                <tbody id="tabelaLivros"></tbody>
            </table>
        </div>

        <div id="formLivroContainer" style="display:none; margin-top:20px;">
            <div class="form-padrao">
                <h3 id="formLivroTitulo">Cadastrar Livro</h3>
                <form id="formLivro">
                    <input type="hidden" id="livroId">
                    <div class="campo"><label>Título</label><input type="text" id="titulo" required></div>
                    <div class="campo"><label>Autor</label><input type="text" id="autor" required></div>
                    <div class="campo"><label>ISBN</label><input type="text" id="isbn" required></div>
                    <div class="campo"><label>Categoria</label><input type="text" id="categoria" required></div>
                    <div class="campo"><label>Exemplares</label><input type="number" id="exemplares" min="1" value="1" required></div>
                    <button type="submit">Salvar</button>
                    <button type="button" onclick="fecharFormLivro()" style="background:#999; margin-top:10px;">Cancelar</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/dados.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/livros.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            verificarAutenticacao();
            exibirUsuarioNoMenu();
            carregarTabelaLivros();
        });
    </script>
</body>
</html>
