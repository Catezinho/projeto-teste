<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários - Biblioteca</title>
    <link rel="stylesheet" href="../css/estilo.css">
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo">📚 Biblioteca</div>
            <div class="menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="livros.html">Livros</a>
                <a href="usuarios.html" class="ativo">Usuários</a>
                <a href="emprestimos.html">Empréstimos</a>
                <a href="devolucoes.html">Devoluções</a>
                <a href="consultar.html">Consultar</a>
                <a href="relatorios.html">Relatórios</a>
            </div>
            <div class="usuario">
                <span id="nomeUsuario"></span>
                <button onclick="logout()">Sair</button>
            </div>
        </nav>

        <h2>Gerenciar Usuários</h2>
        <button onclick="abrirFormUsuario()" class="btn-primary" style="width:auto; margin-bottom:16px;">+ Novo Usuário</button>

        <div class="tabela-wrapper">
            <table>
                <thead><tr><th>ID</th><th>Nome</th><th>E-mail</th><th>Tipo</th><th>Ativo</th><th>Ações</th></tr></thead>
                <tbody id="tabelaUsuarios"></tbody>
            </table>
        </div>

        <div id="formUsuarioContainer" style="display:none; margin-top:20px;">
            <div class="form-padrao">
                <h3 id="formUsuarioTitulo">Cadastrar Usuário</h3>
                <form id="formUsuario">
                    <input type="hidden" id="usuarioId">
                    <div class="campo"><label>Nome</label><input type="text" id="nome" required></div>
                    <div class="campo"><label>E-mail</label><input type="email" id="email" required></div>
                    <div class="campo"><label>Tipo</label>
                        <select id="tipo"><option value="Aluno">Aluno</option><option value="Professor">Professor</option></select>
                    </div>
                    <div class="campo" style="display:flex; align-items:center; gap:10px;">
                        <input type="checkbox" id="ativo" checked>
                        <label for="ativo">Ativo</label>
                    </div>
                    <button type="submit">Salvar</button>
                    <button type="button" onclick="fecharFormUsuario()" style="background:#999; margin-top:10px;">Cancelar</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/dados.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/usuarios.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            verificarAutenticacao();
            exibirUsuarioNoMenu();
            carregarTabelaUsuarios();
        });
    </script>
</body>
</html>
