<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar Senha</title>
    <link rel="stylesheet" href="css/estilo.css" />
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <h2>🔑 Recuperar Senha</h2>
            <p>Digite seu e-mail para receber um link de redefinição.</p>
            <form id="formRecuperar" class="login-form">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="emailRecuperacao" placeholder="seu@email.com" required />
                </div>
                <button type="submit" class="btn-primary">Enviar link</button>
                <div id="mensagemRecuperacao" class="error-message"></div>
            </form>
            <div class="login-footer">
                <a href="index.html" class="register-link">Voltar ao login</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('formRecuperar').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('emailRecuperacao').value;
            document.getElementById('mensagemRecuperacao').innerHTML =
                `<span style="color:#2e7d32;">Link enviado para ${email} (simulação).</span>`;
            document.getElementById('emailRecuperacao').value = '';
        });
    </script>
</body>
</html>
